name: Test & Coverage

on:
  push:
    branches: [master]
  pull_request:

# Why: push 時は read のみ、PR コメント書き込みは job レベルで付与
permissions:
  contents: read

jobs:
  unit-test:
    name: Unit Test & Coverage
    runs-on: ubuntu-latest
    # Why: カバレッジレポートを PR コメントに書き込むため write 権限が必要
    # push イベントでは pull-requests 権限は不要なので job レベルで最小権限にする
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn

      - name: Run unit tests with coverage
        run: yarn vitest run --project=unit --coverage

      - name: Report coverage to PR
        # Why: PR のときだけカバレッジレポートを投稿する
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json
