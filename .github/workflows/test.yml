name: Test & Coverage

on:
  push:
    branches: [master]
  pull_request:

# Why: workflow 全体は最小権限 (read) に設定
permissions:
  contents: read

jobs:
  unit-test:
    name: Unit Test & Coverage
    runs-on: ubuntu-latest
    # Why: PR コメントへのカバレッジレポート投稿に pull-requests: write が必要。
    # push イベント時はこの権限は使われないが、GitHub Actions は
    # イベント種別に関わらず job 定義の permissions を適用する仕様のため、
    # レポート投稿ステップ自体を if で PR 時のみに制限して安全性を担保する。
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        # Why: CI=true で vitest.config.ts のカバレッジ対象を libs/ に限定する。
        # components/ のカバレッジは Storybook テスト経由でローカルで確認する運用。
        run: pnpm vitest run --project=unit --coverage

      - name: Extract coverage percentage
        # Why: coverage-summary.json から lines カバレッジを取り出し、後続ステップで使う
        id: coverage
        run: |
          LINES=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.lines.pct)")
          echo "lines=$LINES" >> "$GITHUB_OUTPUT"

      - name: Report coverage to PR
        # Why: PR のときだけカバレッジレポートを投稿する。
        # push イベント時はスキップされるため pull-requests: write は実質使われない。
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

      - name: Update coverage badge
        # Why: master push 時のみ Gist のバッジ JSON を更新する。
        # PR 時はバッジ更新不要（マージされるまで master のカバレッジは変わらない）。
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 8124a9e2d8ac31a6b86923d4fe80dae9
          filename: coverage-badge.json
          label: coverage
          message: ${{ steps.coverage.outputs.lines }}%
          valColorRange: ${{ steps.coverage.outputs.lines }}
          minColorRange: 0
          maxColorRange: 100
