name: Lint

on:
  pull_request:

# Why: GITHUB_TOKEN の権限を最小化してサプライチェーン攻撃リスクを低減する。
#      コードチェックのみで書き込み不要なため contents: read で十分。
permissions:
  contents: read

jobs:
  biome:
    name: Biome check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome check
        # Why: check:ci は --write なしで差分を検出するだけのモード。
        #      CI では自動修正せず、問題があれば失敗させてプルリクエストで気づけるようにする。
        run: pnpm check:ci

      - name: Run lat check
        # Why: lat.md ナレッジグラフの wiki リンクとコード参照の整合性を CI で保証する。
        #      ローカルの pre-push フックと同等の検証を CI でも行い、不整合を早期検出する。
        run: pnpm lat:check

      - name: Run Knip check
        # Why: 未使用 export / ファイル / 依存パッケージを CI で可視化する。
        #      continue-on-error: true にしているのは既存の指摘を段階的に解消するため。
        #      全件解消後は continue-on-error を外してハードゲートにする。
        continue-on-error: true
        run: pnpm unused
