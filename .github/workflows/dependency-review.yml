# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request, surfacing known-vulnerable versions of the packages declared or updated in the PR. Once installed, if the workflow run is marked as required, PRs introducing known-vulnerable packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
# Public documentation: https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/about-dependency-review#dependency-review-enforcement
name: 'Dependency Review'
on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
        with:
          # ip@2.0.1 は GHSA-2p57-rm9w-gvfp (SSRF) の修正版が upstream に存在しないため許可
          # 参照: https://github.com/mieze018/portfolio-v2/security/dependabot/33
          # lodash 4.x は全バージョンで GHSA-r5fr-rjxr-66jc / GHSA-f23m-r3pf-42rh が存在するため許可
          # (pnpm.overrides で 4.17.23 に固定済み・5.x への upgrade は破壊的変更のため見送り)
          # vite 8.x の dev-server 系 CVE は本番には影響しないため許可
          allow-ghsas: >-
            GHSA-2p57-rm9w-gvfp,
            GHSA-r5fr-rjxr-66jc,
            GHSA-f23m-r3pf-42rh,
            GHSA-p9ff-h696-f583,
            GHSA-v2wj-q39q-566r,
            GHSA-4w7w-66w2-5vf9
